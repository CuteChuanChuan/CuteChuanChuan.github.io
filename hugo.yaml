baseURL: https://cutechuanchuan.github.io/

languageCode: en
title: "Raymond's Portfolio"

module:
  imports:
  - path: github.com/hugo-toha/toha/v4
  mounts:
  - source: static/files
    target: static/files
  - source: ./node_modules/flag-icons/flags
    target: static/flags
  - source: ./node_modules/@fontsource/mulish/files
    target: static/files
  - source: ./node_modules/katex/dist/fonts
    target: static/fonts

languages:
  en:
    languageCode: en
    languageName: English
    title: "Raymond's Portfolio"
    weight: 1

defaultContentLanguage: en

markup:
  goldmark:
    renderer:
      unsafe: true  # Required by Toha theme for HTML-in-Markdown features
  tableOfContents:
    startLevel: 2
    endLevel: 6
    ordered: false

outputs:
  home:
  - HTML
  - RSS
  - JSON

enableEmoji: true

params:
  background: /images/site/background.jpg
  logo:
    main: /images/site/main-logo.png
    inverted: /images/site/inverted-logo.png
    favicon: /images/site/favicon.png

  gitRepo: https://github.com/CuteChuanChuan/CuteChuanChuan.github.io
  gitBranch: main

  topNavbar:
    maxVisibleSections: 5

  darkMode:
    provider: darkreader
    enable: true
    default: system

  features:
    portfolio:
      enable: true
    blog:
      enable: true
      showAuthor: true
    notes:
      enable: false
    comment:
      enable: false
    analytics:
      enable: false
    support:
      enable: false
    toc:
      enable: true
    tags:
      enable: true
      on_card: true
    flags:
      enable: false
    syntaxHighlight:
      enable: true
    readingTime:
      enable: true
    copyCodeButton:
      enable: true
    pagination:
      maxPostsPerPage: 12

  footer:
    enable: true
    template: footer.html
    navigation:
      enable: true
    contactMe:
      enable: true
    credentials:
      enable: true
    newsletter:
      enable: false
    disclaimer:
      enable: false
